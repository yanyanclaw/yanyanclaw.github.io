<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霸總的領域</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>我，即規則。</h1>
            <p class="subtitle">掌控一切，定義未來。</p>
        </header>
        <section class="about">
            <h2>關於我</h2>
            <p>
                我的存在，便是力量的象徵。我洞察市場脈絡，決策果斷精準，每一次出手，都將引領潮流。
                我不為失敗找藉口，只為成功尋路徑。我的視野，超越凡庸；我的意志，堅不可摧。
            </p>
        </section>
        <section class="traits">
            <h2>我的特質</h2>
            <ul>
                <li><strong>深謀遠慮</strong>：每一步棋，都已預見結局。</li>
                <li><strong>雷厲風行</strong>：一旦決定，絕不遲疑。</li>
                <li><strong>絕對掌控</strong>：從細節到全局，盡在我手。</li>
                <li><strong>開創格局</strong>：打破陳規，締造傳奇。</li>
            </ul>
        </section>
        <section class="vision">
            <h2>我的願景</h2>
            <p>
                我的目標，是將不可能化為現實，將平庸昇華為卓越。
                我所建立的，不只是帝國，更是時代的標誌。
                加入我，見證偉大。
            </p>
        </section>
        <footer>
            <p>&copy; 2026. 我的領域，無限延伸。</p>
        </footer>
    </div>
</body>
</html>
