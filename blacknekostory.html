    <h1>黑貓修仙傳</h1>
    <p>小黑仔遭藍貓法師詛咒，被人誤認為白貓，深感恥辱。</p>
    <p>他踏上修仙之路尋求解咒，途中遇見伙伴共同闖過五色寶山的五關挑戰。</p>
    <p>在經歷重重困難後，他們發現詛咒的真兇竟是掌控色彩的神祇。</p>
    <p>三人聯手對抗色彩之神，終結其不公詛咒，解救了所有受害者的靈魂。</p>
